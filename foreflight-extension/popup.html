<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 320px;
      margin: 0;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #1a202c;
      color: #e2e8f0;
    }
    .header {
      display: flex;
      align-items: center;
      margin-bottom: 16px;
      border-bottom: 1px solid #2d3748;
      padding-bottom: 12px;
    }
    .logo {
      width: 24px;
      height: 24px;
      margin-right: 10px;
      fill: #3182ce;
    }
    .title {
      font-size: 16px;
      font-weight: 700;
      color: #ffffff;
    }
    .description {
      font-size: 13px;
      color: #a0aec0;
      margin-bottom: 16px;
      line-height: 1.4;
    }
    .btn {
      width: 100%;
      background-color: #3182ce;
      color: #ffffff;
      border: none;
      padding: 10px 16px;
      font-size: 14px;
      font-weight: 600;
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      justify-content: center;
      align-items: center;
      transition: background-color 0.2s ease, transform 0.1s ease;
      box-sizing: border-box;
    }
    .btn:hover {
      background-color: #2b6cb0;
    }
    .btn:active {
      transform: scale(0.98);
    }
    .btn:disabled {
      background-color: #4a5568;
      color: #a0aec0;
      cursor: not-allowed;
      transform: none;
    }
    .status-container {
      margin-top: 16px;
      display: none;
    }
    .status-text {
      font-size: 13px;
      color: #cbd5e0;
      margin-bottom: 8px;
    }
    .progress-bar-bg {
      width: 100%;
      height: 6px;
      background-color: #4a5568;
      border-radius: 3px;
      overflow: hidden;
    }
    .progress-bar-fill {
      width: 0%;
      height: 100%;
      background-color: #3182ce;
      transition: width 0.3s ease, background-color 0.3s ease;
    }
    .error-msg {
      margin-top: 12px;
      color: #fc8181;
      font-size: 13px;
      line-height: 1.4;
      display: none;
      padding: 8px;
      background-color: rgba(229, 62, 62, 0.15);
      border: 1px solid rgba(229, 62, 62, 0.3);
      border-radius: 4px;
    }
    .success-msg {
      margin-top: 12px;
      color: #68d391;
      font-size: 13px;
      font-weight: 600;
      display: none;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="header">
    <svg class="logo" viewBox="0 0 24 24">
      <path d="M21 16v-2l-8-5V3.5c0-.83-.67-1.5-1.5-1.5S10 2.67 10 3.5V9l-8 5v2l8-2.5V19l-2 1.5V22l3.5-1 3.5 1v-1.5L14 19v-5.5l7 2.5z"/>
    </svg>
    <div class="title">ForeFlight W&B Scraper</div>
  </div>

  <div class="description">
    Navigate to your authenticated <strong>plan.foreflight.com</strong> session and click the button below to extract your weight & balance profiles.
  </div>

  <button id="scrape-btn" class="btn">Export W&B to CSV</button>

  <div id="status-container" class="status-container">
    <div id="status-text" class="status-text">Initializing...</div>
    <div class="progress-bar-bg">
      <div id="progress-bar" class="progress-bar-fill"></div>
    </div>
  </div>

  <div id="error-box" class="error-msg"></div>
  <div id="success-box" class="success-msg">Export completed successfully!</div>

  <script src="popup.js"></script>
</body>
</html>
